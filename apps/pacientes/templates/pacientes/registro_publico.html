{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto card bg-base-100 shadow-xl">
    <div class="card-body">
        <h1 class="card-title">Registro de paciente</h1>
        <p class="text-sm opacity-70">Institucion: {{ institucion.nombre }}</p>
        <form method="post" class="space-y-3">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                {% for field in form %}
                <div>
                    {{ field.label_tag }}
                    {{ field }}
                    {% if field.errors %}<p class="text-error text-sm">{{ field.errors|join:', ' }}</p>{% endif %}
                </div>
                {% endfor %}
            </div>
            <button class="btn btn-primary">Registrarme</button>
            <a href="{% url 'home' %}" class="btn btn-ghost">Volver</a>
        </form>
    </div>
</div>
{% endblock %}
