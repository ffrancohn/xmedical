{% if variables %}
    <p class="text-sm opacity-70">Campos configurados para {{ cita.profesional.especialidad.nombre }}.</p>
    {% for field in form %}
        <div class="form-control w-full">
            <label class="label" for="{{ field.id_for_label }}">
                <span class="label-text">{{ field.label }}{% if field.field.required %} *{% endif %}</span>
            </label>
            {{ field }}
            {% if field.errors %}
                <label class="label"><span class="label-text-alt text-error">{{ field.errors|join:", " }}</span></label>
            {% endif %}
        </div>
    {% endfor %}
{% else %}
    <p class="opacity-70">No hay variables clinicas configuradas para esta especialidad.</p>
{% endif %}
