<div class="form-control w-full {% if field.errors %}xm-field--error{% endif %}">
    <label class="label" for="{{ field.id_for_label }}">
        <span class="label-text font-medium">{{ field.label }}</span>
        {% if field.field.required %}<span class="label-text-alt text-error">*</span>{% endif %}
    </label>
    {{ field }}
    {% if help_text %}
    <label class="label"><span class="label-text-alt opacity-70">{{ help_text }}</span></label>
    {% elif field.help_text %}
    <label class="label"><span class="label-text-alt opacity-70">{{ field.help_text }}</span></label>
    {% endif %}
    {% if field.errors %}
    <label class="label"><span class="label-text-alt text-error">{{ field.errors|join:", " }}</span></label>
    {% endif %}
</div>
